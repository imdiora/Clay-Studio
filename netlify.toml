[build]
  command = "npm run build"
  publish = "dist"

# Keep FFmpeg / SharedArrayBuffer support working in production.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

# Production equivalents of the local Vite dev proxies.
# These run through Netlify Functions so API keys can come from environment
# variables instead of being bundled into the frontend.
[[redirects]]
  from = "/gemini-proxy/*"
  to = "/.netlify/functions/gemini-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/kie-proxy/*"
  to = "/.netlify/functions/kie-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/kie-upload-proxy/*"
  to = "/.netlify/functions/kie-upload-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/openai-proxy/*"
  to = "/.netlify/functions/openai-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/anthropic-proxy/*"
  to = "/.netlify/functions/anthropic-proxy/:splat"
  status = 200
  force = true

# SPA fallback must come after API proxy rewrites.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
